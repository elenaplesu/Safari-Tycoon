# Default image (https://hub.docker.com/_/microsoft-dotnet-core-sdk/)
image: mcr.microsoft.com/dotnet/sdk:9.0

stages:
  - build
  - test

before_script:
  - dotnet --version

# Build
build:
  stage: build
  only: [master]

  image: mcr.microsoft.com/dotnet/framework/sdk:4.8
  tags: [windows]
  script:
    - dotnet build Safari.sln
